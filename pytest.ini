[pytest]
;addopts =
;    -v -capture=fd
;    --verbose
;    --self-contained-html
;    -p no:warnings
;    --junit-xml=report/result/results.xml
testpaths = tests/scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: marks tests as smoke
    test : marks tests as test
    log : marks tests as log
    onLineIndex : marks tests is call online enterprise index interface
    onLineSupermarket: marks tests is call online supermarket enterprise index interface

log_cli = 1
log_cli_level = INFO
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_cli_format = %(asctime)s - %(filename)s - %(name)s - %(module)s - %(funcName)s - %(lineno)d - %(levelname)s - %(message)s
log_file = log/run.log
log_file_level = INFO
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s - %(filename)s -%(name)s - %(module)s - %(funcName)s - %(lineno)d - %(levelname)s - %(message)s
